<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playing Cards</title>
    <link rel="stylesheet" href="card.css">
</head>
<body>

<div class="container">
    <!-- Ace of Hearts -->
    <div class="card red">
        <div class="top">A ♥</div>
        <div class="center">♥</div>
        <div class="bottom">A ♥</div>
    </div>

    <!-- Ace of Diamonds -->
    <div class="card red">
        <div class="top">A ♦</div>
        <div class="center">♦</div>
        <div class="bottom">A ♦</div>
    </div>

    <!-- Ace of Spades -->
    <div class="card black">
        <div class="top">A ♠</div>
        <div class="center">♠</div>
        <div class="bottom">A ♠</div>
    </div>

    <!-- Ace of Clubs -->
    <div class="card black">
        <div class="top">A ♣</div>
        <div class="center">♣</div>
        <div class="bottom">A ♣</div>
    </div>
</div>

</body>
</html>
